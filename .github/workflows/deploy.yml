name: Deploy NL-to-SQL Engine
 
# ── When does this pipeline run? ─────────────────────────────
on:
  push:
    branches:
      - main          # Run on every push to main
  pull_request:
    branches:
      - main          # Run tests on every PR targeting main
 
# ── Environment variables available to all jobs ───────────────
env:
  AWS_REGION:       us-east-1
  STACK_NAME:       nl-to-sql-engine
  PYTHON_VERSION:   '3.13'
 
# ── Jobs ─────────────────────────────────────────────────────
jobs:
 
  # ── Job 1: Run tests ───────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
 
      - name: Install dependencies
        run: |
          pip install boto3 botocore pytest
 
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
 
  # ── Job 2: Deploy to AWS (only on push to main) ────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test          # Only runs if test job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
 
      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
 
      - name: SAM Build
        run: |
          cd infrastructure
          sam build
 
      - name: SAM Deploy
        run: |
          cd infrastructure
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
 
      - name: Print API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs' \
            --output table